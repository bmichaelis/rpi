<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timpanogos Soccer — UHSAA RPI Rankings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #f5f5f7;
      --surface:    #ffffff;
      --border:     #e0e0e0;
      --text:       #1a1a1a;
      --muted:      #6e6e73;
      --accent:     #1d4ed8;
      --accent-bg:  #eff6ff;
      --our-bg:     #fef9c3;
      --our-border: #ca8a04;
      --our-text:   #78350f;
      --rank-color: #9ca3af;
      --row-hover:  #f0f4ff;
      --row-active: #dbeafe;
      --mono: ui-monospace, "SF Mono", "Cascadia Code", monospace;
      --sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --radius: 8px;
      --radius-sm: 4px;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    header h1 { font-size: 1.05rem; font-weight: 700; white-space: nowrap; }

    header .subtitle { font-size: 0.78rem; color: var(--muted); }

    header .computed {
      margin-left: auto;
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── Two-column body ─────────────────────────────────────── */
    .body {
      display: grid;
      grid-template-columns: 280px 1fr;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left: ranked list ───────────────────────────────────── */
    .list-panel {
      border-right: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .list-col-head {
      display: grid;
      grid-template-columns: 2rem 1fr 4.5rem;
      gap: 0.25rem;
      padding: 0.45rem 0.75rem;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .list-col-head .rpi-col { text-align: right; }

    .list-scroll { overflow-y: auto; flex: 1; }

    .team-row {
      display: grid;
      grid-template-columns: 2rem 1fr 4.5rem;
      gap: 0.25rem;
      align-items: center;
      padding: 0.55rem 0.75rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
      user-select: none;
    }

    .team-row:hover  { background: var(--row-hover); }
    .team-row.active { background: var(--row-active); }

    .team-row.our-team {
      background: var(--our-bg);
      border-left: 3px solid var(--our-border);
      padding-left: calc(0.75rem - 3px);
    }

    .team-row.our-team:hover  { background: #fde68a; }
    .team-row.our-team.active { background: #fde68a; }

    .rank {
      font-size: 0.68rem;
      color: var(--rank-color);
      font-variant-numeric: tabular-nums;
      text-align: right;
      font-weight: 500;
    }

    .team-name {
      font-size: 0.82rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .our-team .team-name { color: var(--our-text); font-weight: 700; }

    .rpi-pill {
      font-size: 0.75rem;
      font-family: var(--mono);
      font-weight: 600;
      color: var(--accent);
      text-align: right;
    }

    /* ── Right: detail panel ─────────────────────────────────── */
    .detail-panel {
      overflow-y: auto;
      padding: 1.25rem;
      background: var(--bg);
    }

    .detail-empty {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .detail-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      max-width: 520px;
    }

    /* Card head */
    .card-head {
      padding: 1rem 1.25rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .card-head .title {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 0.35rem;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      align-items: center;
    }

    .badge {
      display: inline-block;
      font-size: 0.67rem;
      font-weight: 600;
      padding: 0.15em 0.55em;
      border-radius: 999px;
      letter-spacing: 0.03em;
    }

    .badge-class  { background: var(--accent-bg); color: var(--accent); }
    .badge-rank   { background: #f0fdf4; color: #166534; }
    .badge-ours   { background: var(--our-bg); color: #92400e; }

    .record {
      font-size: 0.88rem;
      font-weight: 600;
      font-family: var(--mono);
    }

    .maxpreps-link {
      font-size: 0.75rem;
      color: var(--accent);
      text-decoration: none;
      margin-left: auto;
    }

    .maxpreps-link:hover { text-decoration: underline; }

    /* RPI hero */
    .rpi-hero {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
    }

    .rpi-big {
      font-size: 2.4rem;
      font-weight: 800;
      font-family: var(--mono);
      letter-spacing: -0.03em;
      color: var(--accent);
      line-height: 1;
    }

    .rpi-label { font-size: 0.78rem; color: var(--muted); font-weight: 500; }

    /* Component breakdown */
    .section {
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    .section:last-child { border-bottom: none; }

    .section-title {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.55rem;
    }

    .component-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.6rem;
    }

    .component-cell {
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 0.5rem 0.6rem;
    }

    .cc-label {
      font-size: 0.62rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 0.15rem;
    }

    .cc-val {
      font-size: 1rem;
      font-weight: 700;
      font-family: var(--mono);
    }

    .cc-weight { font-size: 0.62rem; color: var(--muted); }

    /* Stats rows */
    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 0.3rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.83rem;
    }

    .stat-row:last-child { border-bottom: none; }
    .stat-label { color: var(--muted); }
    .stat-val { font-family: var(--mono); font-weight: 600; }

    /* Formula */
    .formula {
      padding: 0.6rem 1.25rem;
      font-size: 0.7rem;
      color: var(--muted);
      font-family: var(--mono);
      border-top: 1px solid var(--border);
    }

    /* ── Full-body states ─────────────────────────────────────── */
    .full-msg {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-size: 0.9rem;
      color: var(--muted);
      padding: 3rem;
      text-align: center;
    }

    .full-msg.error { color: #b91c1c; }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 600px) {
      body { height: auto; overflow: auto; }

      .body {
        grid-template-columns: 1fr;
        overflow: visible;
      }

      .list-panel {
        border-right: none;
        border-bottom: 1px solid var(--border);
        max-height: 40vh;
      }

      .detail-panel { overflow-y: visible; }

      header .computed { margin-left: 0; flex-basis: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <h1>UHSAA Boys Soccer — 4A RPI Rankings</h1>
    <span class="subtitle">RPI = 0.45(MWP) + 0.45(OWP) + 0.10(OOWP)</span>
    <span class="computed" id="computed-at"></span>
  </header>

  <div class="body" id="body">
    <div class="full-msg" id="loading">Loading&hellip;</div>
  </div>

  <script>
    const OUR_SLUG = "ut/orem/timpanogos-timberwolves";

    function fmt4(n) { return (+n).toFixed(4); }
    function esc(s) {
      return String(s)
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }
    function maxPrepsUrl(slug) {
      return `https://www.maxpreps.com/${slug}/soccer/spring/schedule/`;
    }
    function fmtTime(iso) {
      try {
        return new Date(iso).toLocaleString(undefined, {
          month:"short", day:"numeric", year:"numeric",
          hour:"numeric", minute:"2-digit"
        });
      } catch { return iso; }
    }

    let currentSlug = null;

    function buildUI(data) {
      const teams = Object.values(data).sort((a, b) => b.rpi - a.rpi);

      document.getElementById("body").innerHTML = `
        <div class="list-panel">
          <div class="list-col-head">
            <span>#</span><span>Team</span><span class="rpi-col">RPI</span>
          </div>
          <div class="list-scroll" id="list-scroll"></div>
        </div>
        <div class="detail-panel" id="detail-panel">
          <div class="detail-empty">Select a team to see details.</div>
        </div>
      `;

      const listEl = document.getElementById("list-scroll");
      teams.forEach((team, i) => {
        const isOurs = team.team === OUR_SLUG;
        const row = document.createElement("div");
        row.className = "team-row" + (isOurs ? " our-team" : "");
        row.dataset.slug = team.team;
        row.innerHTML = `
          <span class="rank">${i + 1}</span>
          <span class="team-name" title="${esc(team.teamName)}">${esc(team.teamName)}</span>
          <span class="rpi-pill">${fmt4(team.rpi)}</span>
        `;
        row.addEventListener("click", () => selectTeam(team, i + 1));
        listEl.appendChild(row);
      });

      const ourTeam = data[OUR_SLUG];
      if (ourTeam) {
        document.getElementById("computed-at").textContent =
          "Updated: " + fmtTime(ourTeam.computedAt);
        const ourRank = teams.findIndex(t => t.team === OUR_SLUG) + 1;
        selectTeam(ourTeam, ourRank);
      } else if (teams.length) {
        selectTeam(teams[0], 1);
      }
    }

    function selectTeam(team, rank) {
      currentSlug = team.team;
      document.querySelectorAll(".team-row").forEach(r => {
        r.classList.toggle("active", r.dataset.slug === currentSlug);
      });
      const activeRow = document.querySelector(".team-row.active");
      if (activeRow) activeRow.scrollIntoView({ block: "nearest" });
      renderDetail(team, rank);
    }

    function renderDetail(team, rank) {
      const isOurs = team.team === OUR_SLUG;
      document.getElementById("detail-panel").innerHTML = `
        <div class="detail-card">
          <div class="card-head">
            <div class="title">${esc(team.teamName)}</div>
            <div class="meta-row">
              <span class="badge badge-class">${esc(team.classification)}</span>
              <span class="record">${esc(team.record)}</span>
              <span class="badge badge-rank">Rank #${rank}</span>
              ${isOurs ? '<span class="badge badge-ours">Our Team</span>' : ""}
              <a class="maxpreps-link" href="${esc(maxPrepsUrl(team.team))}"
                 target="_blank" rel="noopener">MaxPreps &rarr;</a>
            </div>
          </div>

          <div class="rpi-hero">
            <span class="rpi-big">${fmt4(team.rpi)}</span>
            <span class="rpi-label">RPI</span>
          </div>

          <div class="section">
            <div class="section-title">Component Breakdown</div>
            <div class="component-grid">
              <div class="component-cell">
                <div class="cc-label">MWP</div>
                <div class="cc-val">${fmt4(team.mwp)}</div>
                <div class="cc-weight">45% weight</div>
              </div>
              <div class="component-cell">
                <div class="cc-label">OWP</div>
                <div class="cc-val">${fmt4(team.owp)}</div>
                <div class="cc-weight">45% weight</div>
              </div>
              <div class="component-cell">
                <div class="cc-label">OOWP</div>
                <div class="cc-val">${fmt4(team.oowp)}</div>
                <div class="cc-weight">10% weight</div>
              </div>
            </div>
          </div>

          <div class="section">
            <div class="section-title">Schedule Depth</div>
            <div class="stat-row">
              <span class="stat-label">Games counted</span>
              <span class="stat-val">${team.gamesCounted}</span>
            </div>
            <div class="stat-row">
              <span class="stat-label">Opponents counted</span>
              <span class="stat-val">${team.opponentsCounted}</span>
            </div>
            <div class="stat-row">
              <span class="stat-label">Opp-of-opp counted</span>
              <span class="stat-val">${team.oppOppCounted}</span>
            </div>
          </div>

          <div class="formula">${esc(team.formula)}</div>
        </div>
      `;
    }

    async function load() {
      try {
        const res = await fetch("/api/rpi");
        if (!res.ok) {
          const msg = res.status === 503
            ? "RPI not yet computed — check back after the first scheduled run."
            : `Server error (${res.status}).`;
          document.getElementById("body").innerHTML =
            `<div class="full-msg error">${esc(msg)}</div>`;
          return;
        }
        const data = await res.json();
        // Guard against legacy single-result shape
        const isMulti = data && typeof data === "object" && !("rpi" in data);
        buildUI(isMulti ? data : { [data.team]: data });
      } catch (e) {
        document.getElementById("body").innerHTML =
          `<div class="full-msg error">Failed to load: ${esc(e.message)}</div>`;
      }
    }

    load();
    setInterval(load, 10 * 60 * 1000);
  </script>
</body>
</html>
